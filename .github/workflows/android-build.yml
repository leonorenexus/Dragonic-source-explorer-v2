name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pin to a Gradle version compatible with AGP 8.6.0 / Kotlin 2.0.21.
      # Without this, the runner's default/latest installed Gradle (e.g. 10.x)
      # can be picked up instead, which drops deprecated APIs this AGP/Kotlin
      # combo still relies on and breaks compileDebugKotlin.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonic-source-explorer-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
